<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Plant Disease Detector</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #0b1d3a;
    color: white;
}

.box {
    background: white;
    color: black;
    padding: 20px;
    border-radius: 15px;
    width: 350px;
    margin: 20px auto;
}

img {
    width: 200px;
    margin-top: 10px;
}

#details {
    margin-top: 15px;
    text-align: left;
}
</style>
</head>

<body>

<h1>🌱 AI Plant Disease Detector</h1>

<div class="box">
    <input type="file" accept="image/*" onchange="handleImage(event)">
    <br>
    <img id="preview" />

    <div id="result">Loading model...</div>
    <div id="details"></div>
</div>

<script>
const URL = "./model/";

let model;

// 🔥 ADD YOUR DISEASE INFO HERE
const diseaseInfo = {
    "Rice_Blast": {
        cause: "No disease detected",
        solution: "Keep maintaining good care 🌱"
    },
    "Leaf_Curl_Virus": {
        cause: "Fungal or bacterial infection",
        solution: "Remove affected leaves and use fungicide"
    },
    "Early_Blight": {
        cause: "Fungal infection due to humidity",
        solution: "Use fungicide and avoid overwatering"
    },
    "Downy_Mildew": {
        cause: "Fungus in dry conditions",
        solution: "Apply neem oil or fungicide"
    }
};

async function init() {
    try {
        model = await tmImage.load(URL + "model.json", URL + "metadata.json");
        document.getElementById("result").innerHTML = "Model Loaded ✅";
    } catch (error) {
        console.error(error);
        document.getElementById("result").innerHTML = "Error loading model ❌";
    }
}

async function predict(image) {
    const prediction = await model.predict(image);

    let highest = prediction[0];

    for (let i = 1; i < prediction.length; i++) {
        if (prediction[i].probability > highest.probability) {
            highest = prediction[i];
        }
    }

    const name = highest.className;
    const confidence = (highest.probability * 100).toFixed(2);

    document.getElementById("result").innerHTML =
        "🌿 Disease: " + name + "<br>📊 Confidence: " + confidence + "%";

    // 🔥 SHOW EXTRA DETAILS
    if (diseaseInfo[name]) {
        document.getElementById("details").innerHTML =
            "<b>Cause:</b> " + diseaseInfo[name].cause + "<br><br>" +
            "<b>Solution:</b> " + diseaseInfo[name].solution;
    } else {
        document.getElementById("details").innerHTML =
            "No additional info available.";
    }
}

function handleImage(event) {
    const file = event.target.files[0];
    const img = document.getElementById("preview");

    img.src = URL.createObjectURL(file);

    img.onload = async () => {
        await predict(img);
    };
}

init();
</script>

</body>
</html>
